# Local-only LibreChat config (Ollama, etc.). Not used on Render.
# Copy to librechat.local.yaml (gitignored) for Dev Container development.
# Dev Container sets CONFIG_PATH=/workspaces/librechat.local.yaml automatically.

version: 1.3.12
cache: true

endpoints:
  custom:
    - name: "Ollama"
      apiKey: "ollama"
      baseURL: "http://host.docker.internal:11434/v1/"
      models:
        default:
          - "llama3.1:8b"
          - "qwen3:8b"
        fetch: true
      titleConvo: true
      modelDisplayLabel: "Ollama"
    - name: "Perplexity"
      apiKey: "${PERPLEXITY_API_KEY}"
      baseURL: "https://api.perplexity.ai/"
      models:
        default: ["sonar", "sonar-pro", "sonar-reasoning", "sonar-deep-research"]
        fetch: false
      titleConvo: true
      modelDisplayLabel: "Perplexity"
