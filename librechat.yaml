version: 1.3.12
cache: true

endpoints:
  custom:
    - name: "Perplexity"
      apiKey: "${PERPLEXITY_API_KEY}"
      baseURL: "https://api.perplexity.ai/"
      models:
        default: ["sonar", "sonar-pro", "sonar-reasoning", "sonar-deep-research"]
        fetch: false
      titleConvo: true
      modelDisplayLabel: "Perplexity"

mcpServers:
  google-drive:
    type: "http"
    url: "https://drivemcp.googleapis.com/mcp/v1"
    headers:
      Authorization: "Bearer /etc/secrets/google_key.json"


